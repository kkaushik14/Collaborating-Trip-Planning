name: CI and EC2 Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'scripts/deploy.sh'
      - '.github/workflows/CI.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'scripts/deploy.sh'
      - '.github/workflows/CI.yml'

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm run test:ci

      - name: Build
        run: npm run build

  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: npm run check

      - name: Integration tests
        run: npm test

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      EC2_HOST: ${{ vars.EC2_HOST || secrets.EC2_HOST }}
      EC2_USER: ${{ vars.EC2_USER || secrets.EC2_USER }}
      EC2_PORT: ${{ vars.EC2_PORT || secrets.EC2_PORT }}
      EC2_APP_DIR: ${{ vars.EC2_APP_DIR }}
      REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
      BRANCH_NAME: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        run: |
          test -n "${EC2_HOST}" || (echo "EC2_HOST is required" && exit 1)
          test -n "${EC2_USER}" || (echo "EC2_USER is required" && exit 1)
          test -n "${EC2_PORT}" || (echo "EC2_PORT is required" && exit 1)
          test -n "${{ secrets.EC2_SSH_KEY }}" || (echo "EC2_SSH_KEY secret is required" && exit 1)

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -p "${EC2_PORT}" "${EC2_HOST}" >> ~/.ssh/known_hosts

      - name: Upload deploy script to EC2
        run: |
          scp -P "${EC2_PORT}" -i ~/.ssh/ec2_key scripts/deploy.sh "${EC2_USER}@${EC2_HOST}:/tmp/deploy.sh"

      - name: Execute deploy script on EC2
        run: |
          ssh -p "${EC2_PORT}" -i ~/.ssh/ec2_key "${EC2_USER}@${EC2_HOST}" \
            "chmod +x /tmp/deploy.sh && /tmp/deploy.sh --branch '${BRANCH_NAME}' --repo-url '${REPO_URL}' --app-dir '${EC2_APP_DIR}'"
